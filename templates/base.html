<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Monitoring Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-blue-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <h1 class="text-white text-xl font-bold">Monitoring Dashboard</h1>
                    <div class="hidden md:flex space-x-4">
                        <a href="{% url 'dashboard' %}" 
                           class="{% if request.resolver_match.url_name == 'dashboard' %}bg-blue-700{% endif %} text-white hover:bg-blue-700 px-3 py-2 rounded-md text-sm font-medium">
                            Dashboard
                        </a>
                        <a href="{% url 'server_list' %}" 
                           class="{% if request.resolver_match.url_name == 'server_list' %}bg-blue-700{% endif %} text-white hover:bg-blue-700 px-3 py-2 rounded-md text-sm font-medium">
                            Servers
                        </a>
                        <a href="{% url 'site_list' %}" 
                           class="{% if request.resolver_match.url_name == 'site_list' %}bg-blue-700{% endif %} text-white hover:bg-blue-700 px-3 py-2 rounded-md text-sm font-medium">
                            Sites
                        </a>
                        <a href="{% url 'comparison_dashboard' %}" 
                           class="{% if request.resolver_match.url_name == 'comparison_dashboard' %}bg-blue-700{% endif %} text-white hover:bg-blue-700 px-3 py-2 rounded-md text-sm font-medium">
                            <i class="fas fa-chart-line mr-1"></i>Changes
                        </a>
                    </div>
                </div>
                <div class="text-white">
                    <i class="fas fa-user-circle text-2xl"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-6 px-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Optional Footer -->
    <footer class="max-w-7xl mx-auto px-4 py-4 text-center text-gray-500 text-sm">
        <p>Monitoring Dashboard &copy; {% now "Y" %} | Track your website changes with visual comparisons</p>
    </footer>
</body>
</html>
